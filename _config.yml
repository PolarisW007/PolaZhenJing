# PolaZhenjing v2 — Jekyll Configuration
title: PolaZhenjing
description: "个人 AI 知识博客 · Personal AI Knowledge Blog"
url: "https://PolarisW007.github.io"
baseurl: "/PolaZhenJing"
author: PolaZhenjing

# Build
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/
timezone: Asia/Shanghai

# Pagination
paginate: 10
paginate_path: "/page:num/"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

# Defaults
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "deep-technical"

# Exclude from build
exclude:
  - app/
  - data/
  - wiki.py
  - requirements.txt
  - Gemfile
  - Gemfile.lock
  - PRD.md
  - pola-wukong-ui/
  - 案例/
  - .env
  - .env.example
  - "*.py"
  - __pycache__/
  - .venv/
  - node_modules/
