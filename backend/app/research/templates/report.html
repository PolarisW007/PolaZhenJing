<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        :root {
            --primary-blue: #1a365d;
            --secondary-blue: #2c5282;
            --accent-blue: #3182ce;
            --light-bg: #f7fafc;
            --border-color: #e2e8f0;
            --text-dark: #2d3748;
            --text-muted: #718096;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.8;
            color: var(--text-dark);
            background-color: #fff;
            padding: 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 40px;
            background: linear-gradient(135deg, #e6f2ff 0%, #ffffff 100%);
        }

        .badge {
            display: inline-block;
            padding: 5px 15px;
            background-color: var(--accent-blue);
            color: white;
            font-size: 14px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2.5em;
            color: var(--primary-blue);
            margin: 10px 0;
        }

        .meta {
            color: var(--text-muted);
            font-size: 18px;
            margin-top: 10px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .section-title {
            color: var(--primary-blue);
            font-size: 1.8em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--light-bg);
        }

        .highlight-box {
            background-color: #ebf8ff;
            border-left: 5px solid var(--accent-blue);
            padding: 20px;
            margin: 20px 0;
            border-radius: 0 8px 8px 0;
        }

        h3 { color: var(--secondary-blue); margin: 18px 0 10px; font-size: 1.2em; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 16px;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            text-align: left;
        }

        th {
            background-color: #edf2f7;
            color: var(--secondary-blue);
            font-weight: 600;
        }

        tr:nth-child(even) { background-color: #f9fafb; }

        ul, ol { padding-left: 20px; margin: 15px 0; }
        li { margin: 8px 0; }

        .tag {
            display: inline-block;
            padding: 2px 10px;
            background: #cbd5e0;
            color: #4a5568;
            border-radius: 15px;
            font-size: 14px;
            margin-right: 5px;
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 2px;
            background: var(--accent-blue);
        }

        .timeline-item {
            position: relative;
            margin: 20px 0;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -33px;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-blue);
            border: 3px solid white;
            box-shadow: 0 0 0 2px var(--accent-blue);
        }

        .year {
            font-weight: bold;
            color: var(--primary-blue);
            min-width: 60px;
        }

        .conclusion {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 40px;
            border-radius: 12px;
            margin: 40px 0;
        }

        .conclusion h2 { font-size: 2em; margin-bottom: 15px; }
        .conclusion p { font-size: 18px; opacity: 0.9; }

        .paper-list { list-style: none; padding-left: 0; }
        .paper-list li { margin: 10px 0; padding: 10px; background: #f7fafc; border-radius: 8px; border-left: 3px solid var(--accent-blue); }
        .paper-list a { color: var(--accent-blue); text-decoration: none; }
        .paper-list a:hover { text-decoration: underline; }

        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 14px;
            border-top: 1px solid var(--border-color);
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Header -->
        <header>
            <span class="badge">{{ badge }}</span>
            <h1>{{ title }}</h1>
            <div class="meta">{{ meta_line }}</div>
        </header>

        <!-- Abstract / Core Summary -->
        {% if abstract %}
        <div class="card">
            <h2 class="section-title">&#9889; 核心摘要</h2>
            {{ abstract | safe }}
        </div>
        {% endif %}

        <!-- Main Sections -->
        {% for section in sections %}
        <div class="card">
            <h2 class="section-title">{{ section.title }}</h2>
            {{ section.content | safe }}
        </div>
        {% endfor %}

        <!-- Conclusion -->
        {% if conclusion %}
        <div class="conclusion">
            <h2>核心总结</h2>
            {{ conclusion | safe }}
        </div>
        {% endif %}

        <footer>
            <p>&copy; {{ year }} {{ footer_text }}</p>
        </footer>

    </div>

</body>
</html>
