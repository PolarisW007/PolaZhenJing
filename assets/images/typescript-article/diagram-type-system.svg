<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b68efc;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f4a261;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e4bf7a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="#0f0f1a"/>
  <rect width="960" height="540" fill="url(#neonGrad)" opacity="0.02"/>

  <!-- Grid lines -->
  <g stroke="#1a1a2e" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="60" x2="960" y2="60"/><line x1="0" y1="120" x2="960" y2="120"/>
    <line x1="0" y1="180" x2="960" y2="180"/><line x1="0" y1="240" x2="960" y2="240"/>
    <line x1="0" y1="300" x2="960" y2="300"/><line x1="0" y1="360" x2="960" y2="360"/>
    <line x1="0" y1="420" x2="960" y2="420"/><line x1="0" y1="480" x2="960" y2="480"/>
  </g>

  <!-- Title -->
  <text x="480" y="38" fill="#00f0ff" font-family="SF Mono, Fira Code, monospace" font-size="16" text-anchor="middle" filter="url(#glow)" letter-spacing="2">TypeScript 类型系统架构</text>
  <line x1="200" y1="50" x2="760" y2="50" stroke="url(#neonGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Center column vertical axis -->
  <line x1="480" y1="70" x2="480" y2="500" stroke="#2a2a3e" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- ═══════════ Layer 5 (Top): IDE IntelliSense ═══════════ -->
  <rect x="280" y="70" width="400" height="60" rx="8" fill="#e4bf7a" opacity="0.12" stroke="#e4bf7a" stroke-width="1.5"/>
  <text x="480" y="95" fill="#e4bf7a" font-family="SF Mono, Fira Code, monospace" font-size="14" text-anchor="middle" font-weight="bold" filter="url(#glow)">⚡ IDE 智能提示</text>
  <text x="480" y="118" fill="#e4bf7a" font-family="SF Mono, monospace" font-size="10" text-anchor="middle" opacity="0.7">实时反馈 · 自动补全 · 重构支持</text>
  <!-- Left label -->
  <text x="255" y="100" fill="#e4bf7a" font-family="SF Mono, monospace" font-size="10" text-anchor="end" opacity="0.6">Layer 5</text>

  <!-- Arrow down -->
  <line x1="480" y1="130" x2="480" y2="150" stroke="#555" stroke-width="1"/>
  <polygon points="475,148 480,158 485,148" fill="#555"/>

  <!-- ═══════════ Layer 4: Compiler tsc ═══════════ -->
  <rect x="300" y="158" width="360" height="60" rx="8" fill="#f4a261" opacity="0.12" stroke="#f4a261" stroke-width="1.5"/>
  <text x="480" y="183" fill="#f4a261" font-family="SF Mono, Fira Code, monospace" font-size="14" text-anchor="middle" font-weight="bold">⚙️ 编译器 tsc</text>
  <text x="480" y="206" fill="#f4a261" font-family="SF Mono, monospace" font-size="10" text-anchor="middle" opacity="0.7">类型检查 · 代码转译 · .ts → .js</text>
  <!-- Left label -->
  <text x="275" y="190" fill="#f4a261" font-family="SF Mono, monospace" font-size="10" text-anchor="end" opacity="0.6">Layer 4</text>

  <!-- Arrow down -->
  <line x1="480" y1="218" x2="480" y2="238" stroke="#555" stroke-width="1"/>
  <polygon points="475,236 480,246 485,236" fill="#555"/>

  <!-- ═══════════ Layer 3: Generics ═══════════ -->
  <rect x="320" y="246" width="320" height="60" rx="8" fill="#52b788" opacity="0.12" stroke="#52b788" stroke-width="1.5"/>
  <text x="480" y="271" fill="#52b788" font-family="SF Mono, Fira Code, monospace" font-size="14" text-anchor="middle" font-weight="bold">🔀 泛型 Generics</text>
  <text x="480" y="294" fill="#52b788" font-family="SF Mono, monospace" font-size="10" text-anchor="middle" opacity="0.7">类型参数化 · 条件类型 · 工具类型</text>
  <!-- Left label -->
  <text x="295" y="278" fill="#52b788" font-family="SF Mono, monospace" font-size="10" text-anchor="end" opacity="0.6">Layer 3</text>

  <!-- Arrow down -->
  <line x1="480" y1="306" x2="480" y2="326" stroke="#555" stroke-width="1"/>
  <polygon points="475,324 480,334 485,324" fill="#555"/>

  <!-- ═══════════ Layer 2: Interfaces ═══════════ -->
  <rect x="340" y="334" width="280" height="60" rx="8" fill="#00f0ff" opacity="0.10" stroke="#00f0ff" stroke-width="1.5"/>
  <text x="480" y="359" fill="#00f0ff" font-family="SF Mono, Fira Code, monospace" font-size="14" text-anchor="middle" font-weight="bold">📋 接口 Interfaces</text>
  <text x="480" y="382" fill="#00f0ff" font-family="SF Mono, monospace" font-size="10" text-anchor="middle" opacity="0.7">结构契约 · 属性约束 · 类型组合</text>
  <!-- Left label -->
  <text x="315" y="366" fill="#00f0ff" font-family="SF Mono, monospace" font-size="10" text-anchor="end" opacity="0.6">Layer 2</text>

  <!-- Arrow down -->
  <line x1="480" y1="394" x2="480" y2="414" stroke="#555" stroke-width="1"/>
  <polygon points="475,412 480,422 485,412" fill="#555"/>

  <!-- ═══════════ Layer 1 (Base): Type Annotations ═══════════ -->
  <rect x="360" y="422" width="240" height="60" rx="8" fill="#b68efc" opacity="0.12" stroke="#b68efc" stroke-width="1.5"/>
  <text x="480" y="447" fill="#b68efc" font-family="SF Mono, Fira Code, monospace" font-size="14" text-anchor="middle" font-weight="bold" filter="url(#glow)">🏷️ 类型注解</text>
  <text x="480" y="470" fill="#b68efc" font-family="SF Mono, monospace" font-size="10" text-anchor="middle" opacity="0.7">string · number · boolean · 自定义类型</text>
  <!-- Left label -->
  <text x="335" y="454" fill="#b68efc" font-family="SF Mono, monospace" font-size="10" text-anchor="end" opacity="0.6">Layer 1</text>

  <!-- ═══════════ Right-side annotations ═══════════ -->
  <!-- Code snippets on the right -->
  <text x="730" y="98" fill="#555" font-family="SF Mono, monospace" font-size="9" text-anchor="start" opacity="0.8">// VS Code 自动提示</text>
  <text x="730" y="112" fill="#e4bf7a" font-family="SF Mono, monospace" font-size="9" text-anchor="start" opacity="0.6">user.name → string</text>

  <text x="710" y="186" fill="#555" font-family="SF Mono, monospace" font-size="9" text-anchor="start" opacity="0.8">// 编译时安全网</text>
  <text x="710" y="200" fill="#f4a261" font-family="SF Mono, monospace" font-size="9" text-anchor="start" opacity="0.6">tsc --strict main.ts</text>

  <text x="690" y="274" fill="#555" font-family="SF Mono, monospace" font-size="9" text-anchor="start" opacity="0.8">// 类型参数化</text>
  <text x="690" y="288" fill="#52b788" font-family="SF Mono, monospace" font-size="9" text-anchor="start" opacity="0.6">Array&lt;T&gt; · Promise&lt;U&gt;</text>

  <text x="670" y="362" fill="#555" font-family="SF Mono, monospace" font-size="9" text-anchor="start" opacity="0.8">// 结构契约</text>
  <text x="670" y="376" fill="#00f0ff" font-family="SF Mono, monospace" font-size="9" text-anchor="start" opacity="0.6">interface User { id; name }</text>

  <text x="650" y="450" fill="#555" font-family="SF Mono, monospace" font-size="9" text-anchor="start" opacity="0.8">// 基础类型标注</text>
  <text x="650" y="464" fill="#b68efc" font-family="SF Mono, monospace" font-size="9" text-anchor="start" opacity="0.6">let count: number = 0</text>

  <!-- Bottom label -->
  <text x="480" y="520" fill="#666" font-family="SF Mono, monospace" font-size="11" text-anchor="middle" opacity="0.6">从基础类型到开发体验 —— 每一层都为下一层提供确定性</text>
</svg>
