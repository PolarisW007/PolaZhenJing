<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="neonG2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b68efc;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="960" height="540" fill="#0f0f1a"/>
  <g stroke="#1a1a2e" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="60" x2="960" y2="60"/><line x1="0" y1="120" x2="960" y2="120"/>
    <line x1="0" y1="180" x2="960" y2="180"/><line x1="0" y1="240" x2="960" y2="240"/>
    <line x1="0" y1="300" x2="960" y2="300"/><line x1="0" y1="360" x2="960" y2="360"/>
    <line x1="0" y1="420" x2="960" y2="420"/><line x1="0" y1="480" x2="960" y2="480"/>
  </g>
  <!-- Title -->
  <text x="480" y="38" fill="#00f0ff" font-family="SF Mono, Fira Code, monospace" font-size="16" text-anchor="middle" filter="url(#glow2)" letter-spacing="2">从生成到叙事：三层解决方案</text>
  <line x1="120" y1="50" x2="840" y2="50" stroke="url(#neonG2)" stroke-width="1" opacity="0.4"/>

  <!-- Layer 1: Engine (top) -->
  <rect x="80" y="70" width="800" height="100" rx="10" fill="#0f0f1a" stroke="#b68efc" stroke-width="1.5" opacity="0.8"/>
  <text x="100" y="95" fill="#b68efc" font-family="SF Mono, monospace" font-size="13" filter="url(#glow2)">LAYER 1 ⚡ 生成引擎</text>
  <text x="100" y="118" fill="#8a8a9a" font-family="SF Mono, monospace" font-size="11">Seedance 2.0 | 单镜头质量 | 90%+ 可用率 | 真人肤质 | 光影物理</text>
  <!-- Engine icon boxes -->
  <rect x="520" y="80" width="100" height="30" rx="4" fill="#b68efc" opacity="0.15" stroke="#b68efc" stroke-width="1"/>
  <text x="570" y="100" fill="#b68efc" font-family="SF Mono, monospace" font-size="10" text-anchor="middle">画质 ✓</text>
  <rect x="635" y="80" width="100" height="30" rx="4" fill="#b68efc" opacity="0.15" stroke="#b68efc" stroke-width="1"/>
  <text x="685" y="100" fill="#b68efc" font-family="SF Mono, monospace" font-size="10" text-anchor="middle">运动 ✓</text>
  <rect x="750" y="80" width="100" height="30" rx="4" fill="#b68efc" opacity="0.15" stroke="#b68efc" stroke-width="1"/>
  <text x="800" y="100" fill="#b68efc" font-family="SF Mono, monospace" font-size="10" text-anchor="middle">音画同步 ✓</text>
  <text x="100" y="152" fill="#e63946" font-family="SF Mono, monospace" font-size="11" opacity="0.7">⚠ 只解决 30% 的问题</text>

  <!-- Arrow down -->
  <line x1="480" y1="170" x2="480" y2="195" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
  <polygon points="480,205 473,195 487,195" fill="#00f0ff" opacity="0.5"/>
  <text x="500" y="195" fill="#00f0ff" font-family="SF Mono, monospace" font-size="10" opacity="0.6">需要</text>

  <!-- Layer 2: Chassis (middle) -->
  <rect x="80" y="210" width="800" height="150" rx="10" fill="#0f0f1a" stroke="#00f0ff" stroke-width="1.5"/>
  <text x="100" y="238" fill="#00f0ff" font-family="SF Mono, monospace" font-size="13" filter="url(#glow2)">LAYER 2 🔧 叙事底盘</text>
  <text x="100" y="260" fill="#8a8a9a" font-family="SF Mono, monospace" font-size="11">跨镜头调度 | 世界观管理 | 节奏引擎</text>

  <!-- Three sub-modules -->
  <rect x="110" y="275" width="230" height="70" rx="8" fill="#00f0ff" opacity="0.08" stroke="#00f0ff" stroke-width="1"/>
  <text x="225" y="298" fill="#00f0ff" font-family="SF Mono, monospace" font-size="12" text-anchor="middle">🧠 构建思维</text>
  <text x="225" y="316" fill="#6a6a7a" font-family="SF Mono, monospace" font-size="9" text-anchor="middle">角色库 → 场景设定 → 道具清单</text>
  <text x="225" y="332" fill="#6a6a7a" font-family="SF Mono, monospace" font-size="9" text-anchor="middle">先构建世界，再生成画面</text>

  <rect x="365" y="275" width="230" height="70" rx="8" fill="#00f0ff" opacity="0.08" stroke="#00f0ff" stroke-width="1"/>
  <text x="480" y="298" fill="#00f0ff" font-family="SF Mono, monospace" font-size="12" text-anchor="middle">💾 记忆机制</text>
  <text x="480" y="316" fill="#6a6a7a" font-family="SF Mono, monospace" font-size="9" text-anchor="middle">上下文描述 → 关键帧参考</text>
  <text x="480" y="332" fill="#6a6a7a" font-family="SF Mono, monospace" font-size="9" text-anchor="middle">→ 一致性检查 → 自动修复</text>

  <rect x="620" y="275" width="230" height="70" rx="8" fill="#00f0ff" opacity="0.08" stroke="#00f0ff" stroke-width="1"/>
  <text x="735" y="298" fill="#00f0ff" font-family="SF Mono, monospace" font-size="12" text-anchor="middle">🎬 叙事人才</text>
  <text x="735" y="316" fill="#6a6a7a" font-family="SF Mono, monospace" font-size="9" text-anchor="middle">剪辑节奏 → 情绪铺垫</text>
  <text x="735" y="332" fill="#6a6a7a" font-family="SF Mono, monospace" font-size="9" text-anchor="middle">→ 观众心理 → 镜头语言</text>

  <!-- Arrow down -->
  <line x1="480" y1="360" x2="480" y2="385" stroke="#52b788" stroke-width="2" opacity="0.5"/>
  <polygon points="480,395 473,385 487,385" fill="#52b788" opacity="0.5"/>

  <!-- Layer 3: Output -->
  <rect x="80" y="400" width="800" height="80" rx="10" fill="#0f0f1a" stroke="#52b788" stroke-width="1.5"/>
  <text x="100" y="428" fill="#52b788" font-family="SF Mono, monospace" font-size="13" filter="url(#glow2)">LAYER 3 🎥 叙事作品</text>
  <text x="100" y="452" fill="#8a8a9a" font-family="SF Mono, monospace" font-size="11">人物一致 + 空间连贯 + 节奏精准 = 真正可看的 AI 短剧</text>
  <rect x="620" y="418" width="230" height="40" rx="6" fill="#52b788" opacity="0.15" stroke="#52b788" stroke-width="1"/>
  <text x="735" y="443" fill="#52b788" font-family="SF Mono, monospace" font-size="12" text-anchor="middle">从散落珍珠 → 完整项链</text>

  <!-- Bottom -->
  <text x="480" y="520" fill="#666" font-family="SF Mono, monospace" font-size="10" text-anchor="middle">引擎 + 底盘 + 驾驶者 = 真正能跑的车</text>
</svg>
