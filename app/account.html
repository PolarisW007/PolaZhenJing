{% extends "base.html" %}
{% block title %}用户管理{% endblock %}
{% block content %}
<h2>用户管理</h2>
<form method="POST">
  <div class="form-group">
    <label>账户</label>
    <input type="text" class="form-input" value="{{ user['username'] }} / {{ user['email'] }}" disabled>
  </div>
  <div class="form-group">
    <label for="nickname">昵称</label>
    <input type="text" id="nickname" name="nickname" class="form-input" value="{{ profile.nickname }}" required>
  </div>
  <div class="form-group">
    <label for="avatar_url">头像 URL</label>
    <input type="url" id="avatar_url" name="avatar_url" class="form-input" value="{{ profile.avatar_url }}" placeholder="https://...">
  </div>
  <div class="form-group">
    <label>角色与权限</label>
    <input type="text" class="form-input" value="{{ profile.role }} · {{ profile.permissions | join(', ') }}" disabled>
  </div>
  <button type="submit" class="btn-gold">保存</button>
</form>
<div class="form-links">
  <a href="/">返回织梦空间</a>
  <a href="{{ url_for('auth.change_password') }}">修改密码</a>
  <a href="{{ url_for('auth.logout') }}">退出登录</a>
</div>
{% endblock %}
