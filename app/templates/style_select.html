{% extends "base.html" %}
{% block title %}选择风格{% endblock %}
{% block card_class %}card-full{% endblock %}
{% block content %}
<h2>选择风格</h2>
<p style="text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.5rem;">
  文章：<strong style="color: var(--gold-primary);">{{ title }}</strong>
</p>

<form method="POST" action="{{ url_for('uploader.generate') }}" id="style-form">
  <input type="hidden" name="style" id="selected-style" value="deep-technical">

  <div class="style-grid">
    {% for s in styles %}
    <div class="style-card {% if loop.first %}selected{% endif %}"
         data-style="{{ s.id }}"
         onclick="selectStyle(this, '{{ s.id }}')">
      <div class="style-card-color" style="background: {{ s.color }};"></div>
      <h4>{{ s.name }}</h4>
      <p>{{ s.desc }}</p>
    </div>
    {% endfor %}
  </div>

  <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
    <a href="{{ url_for('uploader.upload') }}" class="btn-ghost" id="back-btn">← 返回</a>
    <button type="submit" class="btn-gold btn-sm" id="generate-btn">生成文章 →</button>
  </div>
</form>

<!-- Progress overlay -->
<div id="progress-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:9999; flex-direction:column; align-items:center; justify-content:center; gap:1.5rem;">
  <div style="text-align:center;">
    <div style="font-size:1.1rem; color:#e8e0d4; margin-bottom:0.5rem;" id="progress-status">正在提交任务…</div>
    <div style="font-size:0.8rem; color:var(--text-muted);">马上跳转到进度页面，请稍候</div>
  </div>
  <div style="width:48px; height:48px; border:3px solid rgba(228,191,122,0.2); border-top-color:var(--gold-primary); border-radius:50%; animation:spin 0.9s linear infinite;"></div>
</div>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
{% endblock %}

{% block scripts %}
<script>
function selectStyle(el, style) {
  document.querySelectorAll('.style-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('selected-style').value = style;
}

(function() {
  var submitted = false;

  // Reset state if user navigates back via browser history
  window.addEventListener('pageshow', function(e) {
    if (e.persisted) {
      submitted = false;
      var btn = document.getElementById('generate-btn');
      btn.disabled = false;
      btn.textContent = '\u751f\u6210\u6587\u7ae0 \u2192';
      btn.style.opacity = '';
      btn.style.cursor = '';
      document.getElementById('back-btn').style.pointerEvents = '';
      document.getElementById('back-btn').style.opacity = '';
      document.querySelectorAll('.style-card').forEach(function(c) {
        c.style.pointerEvents = '';
        c.style.opacity = '';
      });
      document.getElementById('progress-overlay').style.display = 'none';
    }
  });

  document.getElementById('style-form').addEventListener('submit', function(e) {
    if (submitted) { e.preventDefault(); return; }
    submitted = true;

    // Disable buttons
    var btn = document.getElementById('generate-btn');
    btn.disabled = true;
    btn.textContent = '提交中…';
    btn.style.opacity = '0.6';
    btn.style.cursor = 'not-allowed';
    document.getElementById('back-btn').style.pointerEvents = 'none';
    document.getElementById('back-btn').style.opacity = '0.4';

    // Disable style cards
    document.querySelectorAll('.style-card').forEach(function(c) {
      c.style.pointerEvents = 'none';
      c.style.opacity = '0.6';
    });

    // Show spinner overlay until the browser navigates to the status page
    document.getElementById('progress-overlay').style.display = 'flex';
  });
})();
</script>
{% endblock %}
