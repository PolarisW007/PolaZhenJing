{% extends "base.html" %}
{% block title %}选择风格{% endblock %}
{% block card_class %}card-full{% endblock %}
{% block content %}
<h2>选择风格</h2>
<p style="text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.5rem;">
  文章：<strong style="color: var(--gold-primary);">{{ title }}</strong>
</p>

<form method="POST" action="{{ url_for('uploader.generate') }}" id="style-form">
  <input type="hidden" name="style" id="selected-style" value="deep-technical">

  <div class="style-grid">
    {% for s in styles %}
    <div class="style-card {% if loop.first %}selected{% endif %}"
         data-style="{{ s.id }}"
         onclick="selectStyle(this, '{{ s.id }}')">
      <div class="style-card-color" style="background: {{ s.color }};"></div>
      <h4>{{ s.name }}</h4>
      <p>{{ s.desc }}</p>
    </div>
    {% endfor %}
  </div>

  <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
    <a href="{{ url_for('uploader.upload') }}" class="btn-ghost">← 返回</a>
    <button type="submit" class="btn-gold btn-sm">生成文章 →</button>
  </div>
</form>
{% endblock %}

{% block scripts %}
<script>
function selectStyle(el, style) {
  document.querySelectorAll('.style-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('selected-style').value = style;
}
</script>
{% endblock %}
