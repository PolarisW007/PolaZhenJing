{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<h2>修改密码 / Change Password</h2>
<form method="POST">
  <div class="form-group">
    <label for="current_password">Current Password</label>
    <input type="password" id="current_password" name="current_password" class="form-input" required>
  </div>
  <div class="form-group">
    <label for="new_password">New Password (min 6 chars)</label>
    <input type="password" id="new_password" name="new_password" class="form-input" minlength="6" required>
  </div>
  <div class="form-group">
    <label for="confirm_password">Confirm New Password</label>
    <input type="password" id="confirm_password" name="confirm_password" class="form-input" minlength="6" required>
  </div>
  <button type="submit" class="btn-gold">Update Password</button>
</form>
{% endblock %}
