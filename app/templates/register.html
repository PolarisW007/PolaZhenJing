{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<h2>注册</h2>
<form method="POST">
  <div class="form-group">
    <label for="username">用户名</label>
    <input type="text" id="username" name="username" class="form-input" required autofocus>
  </div>
  <div class="form-group">
    <label for="email">QQ邮箱</label>
    <input type="email" id="email" name="email" class="form-input" placeholder="yourname@qq.com" required>
  </div>
  <div class="form-group">
    <label for="password">密码（至少6位）</label>
    <input type="password" id="password" name="password" class="form-input" minlength="6" required>
  </div>
  <button type="submit" class="btn-gold">注册并验证邮箱</button>
</form>
<div class="form-links">
  <a href="{{ url_for('auth.login') }}">已有账号？去登录</a>
</div>
{% endblock %}
