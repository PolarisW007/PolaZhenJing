# =============================================================================
# Module: deploy.yml
# Description: GitHub Actions workflow – builds MkDocs site and deploys to
#              GitHub Pages on every push to main branch.
# Created: 2026-04-06
# Author: PolaZhenjing Team
# =============================================================================

name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs and dependencies
        run: |
          pip install mkdocs==1.6.1 mkdocs-material==9.5.47

      - name: Build MkDocs site
        run: |
          cd site
          mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
